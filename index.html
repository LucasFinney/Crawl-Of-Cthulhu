<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crawl of Cthulhu — A Roguelike</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  color: #b0b0b0;
  font-family: 'Courier New', monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
}
#game-container {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  height: 100vh;
  max-height: 100vh;
  overflow: hidden;
}
#title-bar {
  color: #6a0dad;
  font-size: 14px;
  margin-bottom: 4px;
  letter-spacing: 2px;
  text-shadow: 0 0 8px #6a0dad66;
  text-align: center;
}
#stats-bar {
  display: flex;
  gap: 20px;
  font-size: 13px;
  margin-bottom: 4px;
  padding: 2px 8px;
  background: #111118;
  border: 1px solid #222;
  justify-content: center;
  flex-wrap: wrap;
}
.stat { white-space: nowrap; }
.stat-hp { color: #cc3333; }
.stat-san { color: #9b59b6; }
.stat-atk { color: #e67e22; }
.stat-def { color: #3498db; }
.stat-dlvl { color: #888; }
.stat-xp { color: #f1c40f; }
.stat-gold { color: #f39c12; }
.stat-stam { color: #2ecc71; }

/* Side-by-side layout: map left, message log right */
#main-area {
  display: flex;
  align-items: stretch;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}
#display {
  font-size: 13px;
  line-height: 1.15;
  letter-spacing: 1px;
  white-space: pre;
  background: #0d0d14;
  border: 1px solid #1a1a2e;
  padding: 4px;
  box-shadow: 0 0 20px #0005, inset 0 0 30px #06001a22;
  flex-shrink: 0;
  flex-grow: 0;
  overflow: hidden;
  min-height: 0;
}
#resize-handle {
  width: 4px;
  cursor: col-resize;
  background: #1a1a2e;
  flex-shrink: 0;
  transition: background 0.15s;
}
#resize-handle:hover, #resize-handle.dragging {
  background: #6a0dad88;
}
#message-log {
  padding: 6px 10px;
  background: #111118;
  border: 1px solid #222;
  font-size: 14px;
  line-height: 1.5;
  overflow-y: auto;
  overflow-x: hidden;
  color: #888;
  width: 500px;
  flex-shrink: 0;
  min-height: 0;
  word-wrap: break-word;
  overflow-wrap: break-word;
  white-space: normal;
}
#message-log .msg-danger { color: #cc3333; }
#message-log .msg-warning { color: #e67e22; }
#message-log .msg-good { color: #2ecc71; }
#message-log .msg-sanity { color: #9b59b6; }
#message-log .msg-lore { color: #6a0dad; }
#message-log .msg-info { color: #888; }
#message-log div {
  padding: 2px 0;
  border-bottom: 1px solid #1a1a22;
}
#message-log div:last-child { border-bottom: none; }

#help-bar {
  margin-top: 4px;
  font-size: 11px;
  color: #555;
  text-align: center;
}

/* Overlay screens */
.overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #0a0a0fee;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 100;
}
.overlay-content {
  font-family: 'Courier New', monospace;
  white-space: pre;
  font-size: 14px;
  line-height: 1.4;
  color: #b0b0b0;
  text-align: center;
  max-width: 700px;
}
.overlay-content .title {
  color: #6a0dad;
  text-shadow: 0 0 10px #6a0dad88;
}
.overlay-content .subtitle { color: #9b59b6; }
.overlay-content .key { color: #e67e22; }
.overlay-content .danger { color: #cc3333; }
</style>
</head>
<body>
<div id="game-container">
  <div id="title-bar">☽ CRAWL OF CTHULHU ☽</div>

    <div id="resize-handle"></div>
    <div id="message-log"></div>

// ── Dreamlands Shop ────────────────────────────────────────
const DREAM_ITEMS = [
  {
    id: 'moonMilk',

    name: 'Waking-World Ammunition',
    desc: 'Cartridges that exist in both dreams and reality.',

    effect(p) {

      if (!f) return 'You have no firearm to load.';
      const ammoItemKey = AMMO_TYPE_MAP[f.ammoType];
      if (!ammoItemKey) return 'Strange... the ammunition dissolves.';
      const amount = f.id === 'shotgun' ? rng(3, 5) : f.magSize;

      // Try to add to inventory
      if (inventoryFull()) {
        return 'Your pack is too full to carry more.';

// ── Profession backstories (hidden lore) ──────────────────────
//
// ── SOLDIER: Corporal James Harlan ──
// AEF veteran, Meuse-Argonne offensive, 1918. During a night patrol in the
// Argonne Forest his squad entered a network of German tunnels that descended
// far deeper than any map showed. They found chambers older than the war —
// older than civilization. Something lived down there. Harlan was the only
// one who walked out. The Army listed the rest as MIA. He knows better.
// He's heard the tunnels calling ever since. When he saw the diagrams in the
// old Miskatonic texts — the geometry was the same. The caves beneath Arkham
// are connected to the Argonne. He's sure of it. He has to go back down.
//
// ── DOCTOR: Dr. Eleanor Marsh ──
// Practiced medicine at St. Mary's Hospital in Arkham. Three years ago a
// Jane Doe was brought in from the waterfront, covered in symbols she had
// carved into her own skin. The woman died on Eleanor's table, but not before
// whispering a phrase: "The skin remembers." The autopsy revealed organs
// arranged in configurations that violated known anatomy — yet the body had
// been alive. Eleanor's report was buried by the hospital board. She kept
// investigating. More patients appeared with the same carvings, the same
// whispered phrase. Each autopsy worse than the last. The trail led beneath
// the hospital itself, to tunnels that shouldn't exist.
//
// ── DETECTIVE: Arthur Callahan ──
// Private investigator. Six months ago his partner Victor went to Arkham to
// investigate a string of disappearances near Miskatonic University. Victor's
// last letter contained a torn page from a library book, a sketch of a door
// with no handle, and three words: "Don't follow me." Arthur followed. He
// found Victor's office ransacked, his case board covered in red string
// connecting names, dates, and a symbol Arthur had never seen before. Victor's
// notebook — found wedged behind a radiator — was filled with increasingly
// erratic handwriting. The last legible entry read: "The door is below. It
// opens from the other side."
//

// ── Event selection helpers ───────────────────────────────────
// Pick an event from the unique pool that hasn't been seen yet.
// Returns null if all unique events for this pool have been consumed.
function pickUnseen(events, seenSet) {
  const available = events.filter(e => {
    const key = typeof e === 'string' ? e : e.beats[0].msg;
    return !seenSet.has(key);
  });
  if (available.length === 0) return null;
  const chosen = pick(available);
  seenSet.add(typeof chosen === 'string' ? chosen : chosen.beats[0].msg);
  return chosen;
}

// ── Utility ─────────────────────────────────────────────────
function rng(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function dist(x1, y1, x2, y2) { return Math.sqrt((x2-x1)**2 + (y2-y1)**2); }

// ── Direction system ────────────────────────────────────────
// 4 cardinal directions: 0=N, 1=E, 2=S, 3=W
const DIR_DX = [0, 1, 0, -1];
const DIR_DY = [-1, 0, 1, 0];
const DIR_ANGLES = []; // radians for each direction
for (let i = 0; i < 4; i++) DIR_ANGLES[i] = Math.atan2(DIR_DY[i], DIR_DX[i]);

// Player glyphs per facing direction
const FACING_GLYPHS = ['↑', '→', '↓', '←'];

function dirFromDelta(dx, dy) {
  // Snap any movement (including diagonal) to nearest cardinal direction
  const angle = Math.atan2(dy, dx);
  let bestDir = 0, bestDiff = Infinity;
  for (let i = 0; i < 4; i++) {
    const diff = Math.abs(angleDiff(angle, DIR_ANGLES[i]));
    if (diff < bestDiff) { bestDiff = diff; bestDir = i; }
  }
  return bestDir;
}

function rotateFacing(current, amount) {
  return ((current + amount) % 4 + 4) % 4;
}

function updateFacingToward(tx, ty) {
  const px = state.player.x, py = state.player.y;
  if (tx === px && ty === py) return;
  state.player.facing = dirFromDelta(tx - px, ty - py);
}

// Angle difference, normalized to [-PI, PI]
function angleDiff(a, b) {
  let d = a - b;
  while (d > Math.PI) d -= 2 * Math.PI;
  while (d < -Math.PI) d += 2 * Math.PI;
  return d;
}
