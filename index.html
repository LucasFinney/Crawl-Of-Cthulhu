let dreamComment = '';

function enterDreamlands() {
  dreamPhase = 'intro';
  updateAmbientAudio(); // shift to dreamlands tones
  dreamGreeting = pick(CAT_GREETINGS);

  // Pick a contextual comment
  const p = state.player;
  if (p.sanity < 30 && CAT_COMMENTS_LOW_SAN.length) {
    dreamComment = pick(CAT_COMMENTS_LOW_SAN);
  } else if (p.gold < 10 && CAT_COMMENTS_LOW_GOLD.length) {
    dreamComment = pick(CAT_COMMENTS_LOW_GOLD);
  } else if (state.dlevel >= 5 && CAT_COMMENTS_DEEP.length) {
    dreamComment = pick(CAT_COMMENTS_DEEP);
  } else {
    dreamComment = '';
  }

  // Stock 3-5 items, randomized from the pool
  const pool = [...DREAM_ITEMS];
  // Always include at least one SAN item
  const sanItems = pool.filter(i => i.id === 'moonMilk' || i.id === 'catNap');
  const otherItems = pool.filter(i => i.id !== 'moonMilk' && i.id !== 'catNap');
  dreamStock = [pick(sanItems)];
  // Shuffle others and pick 2-3 more
  const shuffled = otherItems.sort(() => Math.random() - 0.5);
  const extra = rng(2, 3);
  for (let i = 0; i < Math.min(extra, shuffled.length); i++) {
    dreamStock.push(shuffled[i]);
  }
  // Scale prices slightly with depth
  const priceScale = 1 + (state.dlevel - 2) * 0.1;
  dreamStock = dreamStock.map(item => ({
    ...item,
    cost: Math.floor(item.cost * priceScale),
  }));
  dreamCursor = 0;

  renderDreamIntro();
}

function renderDreamIntro() {
  showOverlay(`<span class="title">
  ╔═══════════════════════════════════╗
  ║       THE   D R E A M L A N D S  ║
  ╚═══════════════════════════════════╝</span>

  <span class="subtitle">As you descend, exhaustion overtakes you.
  The stone steps soften beneath your feet.
  The walls become silk. The air tastes of
  jasmine and moonlight.

  You are dreaming.</span>

  ${dreamGreeting}
  ${dreamComment ? '\n  ' + dreamComment : ''}

  <span class="key">[ENTER]</span> Approach the cat's wares
  <span class="key">[ESC]</span> Wake up immediately`);
}

function renderDreamShop() {
  const p = state.player;
  let text = `<span class="title">═══ THE CAT'S WARES ═══</span>
  <span style="color:#f39c12">Gold: ${p.gold}</span>  <span class="stat-san">SAN: ${p.sanity}/${p.maxSanity}</span>  <span class="stat-hp">HP: ${p.hp}/${p.maxHp}</span>\n\n`;

  for (let i = 0; i < dreamStock.length; i++) {
    const item = dreamStock[i];
    const selected = i === dreamCursor;
    const affordable = p.gold >= item.cost;
    const marker = selected ? '<span class="key">▸</span>' : ' ';
    const costColor = affordable ? '#f39c12' : '#cc3333';
    const nameColor = selected ? '#f1c40f' : '#b0b0b0';
    text += `  ${marker} <span style="color:${nameColor}">${item.name}</span>`;
    text += `  <span style="color:${costColor}">${item.cost} gold</span>\n`;
    if (selected) {
      text += `    <span class="subtitle">${item.desc}</span>\n`;
    }
    text += '\n';
  }

  text += `\n  <span class="key">[↑/↓]</span> Browse  <span class="key">[ENTER]</span> Buy  <span class="key">[ESC]</span> Wake up`;

  showOverlay(text);
}

function renderDreamFarewell() {
  const farewell = pick(CAT_FAREWELLS);
  showOverlay(`<span class="title">
  ╔═══════════════════════════════════╗
  ║       THE   D R E A M L A N D S  ║
  ╚═══════════════════════════════════╝</span>

  <span class="subtitle">${farewell}</span>

  <span class="key">[ENTER]</span> Awaken on depth ${state.dlevel}`);
}

function dreamBuy() {
  const item = dreamStock[dreamCursor];
  const p = state.player;
  if (p.gold < item.cost) {
    // Can't afford — the cat comments
    addMsg('"You lack the coin, dreamer. Come back richer — or more desperate."', 'msg-warning');
    renderDreamShop();
    return;
  }
  p.gold -= item.cost;
  const msg = item.effect(p);
  addMsg(msg, 'msg-good');
  // Remove purchased item from stock (one-time purchase)
  dreamStock.splice(dreamCursor, 1);
  if (dreamCursor >= dreamStock.length) dreamCursor = Math.max(0, dreamStock.length - 1);
  if (dreamStock.length === 0) {
    addMsg('"That\'s all I have for you, dreamer."', 'msg-lore');
    dreamPhase = 'farewell';
    renderDreamFarewell();
  } else {
    renderDreamShop();
  }
}

function leaveDreamlands() {
  dreamPhase = '';
  updateAmbientAudio(); // shift back to dungeon tones
  hideOverlay();
  addMsg(`You descend to depth ${state.dlevel}. The air grows heavier...`, 'msg-lore');
  if (state.dlevel === 3) addMsg('A distant piping echoes through the tunnels...', 'msg-sanity');
  if (state.dlevel === 5) addMsg('The geometry of these corridors defies Euclidean reason.', 'msg-sanity');
  if (state.dlevel === 7) addMsg('Ph\'nglui mglw\'nafh Cthulhu R\'lyeh wgah\'nagl fhtagn!', 'msg-lore');
  generateLevel();
  render();
}

// ═══════════════════════════════════════════════════════════════
//  INPUT HANDLING
// ═══════════════════════════════════════════════════════════════
let gameStarted = false;
let showingTitleScores = false;
let showingProfSelect = false;
let devMode = false;

document.addEventListener('keydown', (e) => {
  // Initialize audio on first interaction (browsers require user gesture)
  if (!audio.initialized) initAudio();

  // Title screen
  if (!gameStarted) {
    // Profession selection screen
    if (showingProfSelect) {
      const profMap = { a: 'soldier', b: 'doctor', c: 'detective' };
      const profId = profMap[e.key.toLowerCase()];
      if (profId) {
        gameStarted = true;
        showingProfSelect = false;
        hideOverlay();
        initState(profId);
        assignStartingLoadout(profId);
        generateLevel();
        const prof = PROFESSIONS[profId];
        addMsg(`You are a ${prof.name}. ${prof.desc.replace(/"/g, '')}`, 'msg-lore');
        addMsg('You descend into the darkness beneath Arkham...', 'msg-lore');
        addMsg('The trapdoor slams shut above you.', 'msg-warning');
        if (state.player.firearm) {
          addMsg(`You grip your ${state.player.firearm.name} (${state.player.firearm.ammo}/${state.player.firearm.magSize}).`, 'msg-info');
        }
        if (state.player.weapon) {
          addMsg(`Your ${state.player.weapon.name} is at your side.`, 'msg-info');
        }
        render();
        return;
      }
      if (e.key === 'Escape') {
        showingProfSelect = false;
        titleScreen();
        return;
      }
      return;
    }
    if (showingTitleScores) {
      if (e.key === 'Escape') {
        showingTitleScores = false;
        titleScreen();
      }
      return;
    }
    if (e.key === 'Enter') {
      showingProfSelect = true;
      renderProfessionSelect();
      return;
    }
    if (e.key === 'h' || e.key === 'H') {
      showingTitleScores = true;
      renderHighScoresFromTitle();
      return;
    }
    if (e.key === '?') {
      renderHelp();
      state.showHelp = true;
      return;
    }
    if (e.key === 'Escape') {
      hideOverlay();
      titleScreen();
      state.showHelp = false;
      return;
    }
    return;
  }

  // Dreamlands shop
  if (dreamPhase) {
    e.preventDefault();
    if (dreamPhase === 'intro') {
      if (e.key === 'Enter') {
        dreamPhase = 'shop';
        renderDreamShop();
      } else if (e.key === 'Escape') {
        dreamPhase = 'farewell';
        renderDreamFarewell();
      }
    } else if (dreamPhase === 'shop') {
      if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
        dreamCursor = (dreamCursor - 1 + dreamStock.length) % dreamStock.length;
        renderDreamShop();
      } else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
        dreamCursor = (dreamCursor + 1) % dreamStock.length;
        renderDreamShop();
      } else if (e.key === 'Enter') {
        dreamBuy();
      } else if (e.key === 'Escape') {
        dreamPhase = 'farewell';
        renderDreamFarewell();
      }
    } else if (dreamPhase === 'farewell') {
      if (e.key === 'Enter') {
        leaveDreamlands();
      }
    }
    return;
  }

  // Death/Victory screen — name input phase
  if (state.gameOver && gameOverPhase === 'name_input') {
    if (e.key === 'Enter') {
      submitScore(nameInput);
    } else if (e.key === 'Escape') {
      submitScore('');
    } else if (e.key === 'Backspace') {
      nameInput = nameInput.slice(0, -1);
      // Re-render current input screen
      const isVictory = state.dlevel >= 9 && state.player.hp > 0;
      isVictory ? renderVictoryNameInput() : renderDeathNameInput();
    } else if (e.key.length === 1 && nameInput.length < 16) {
      nameInput += e.key;
      const isVictory = state.dlevel >= 9 && state.player.hp > 0;
      isVictory ? renderVictoryNameInput() : renderDeathNameInput();
    }
    return;
  }

  // Death/Victory screen — scores shown phase
  if (state.gameOver && gameOverPhase === 'scores_shown') {
    if (e.key === 'Enter') {
      gameStarted = false;
      gameOverPhase = '';
      hideOverlay();
      titleScreen();
    }
    return;
  }

  // Inventory screen
  if (state.showInventory) {
    if (e.key === 'Escape' || e.key === 'i' || e.key === 'I') {
      state.showInventory = false;
      state.inventoryDropMode = false;
      hideOverlay();
      render();
      return;
    }
    if (e.key === 't' || e.key === 'T') {
      toggleTorch();
      renderInventory();
      return;
    }
    if (e.key === 'b' || e.key === 'B') {
      state.showInventory = false;
      state.showBestiary = true;
      renderBestiary();
      return;
    }
    if (e.key === 'd' || e.key === 'D') {
      state.inventoryDropMode = !state.inventoryDropMode;
      renderInventory();
      return;
    }
    const num = parseInt(e.key);
    if (num >= 1 && num <= 9) {
      if (state.inventoryDropMode) {
        state.inventoryDropMode = false;
        dropInventoryItem(num - 1);
      } else {
        useInventoryItem(num - 1);
      }
      if (!state.showInventory) {
        hideOverlay();
        render();
      }
      return;
    }
    return;
  }

  // Bestiary screen
  if (state.showBestiary) {
    if (e.key === 'Escape' || e.key === 'b' || e.key === 'B') {
      state.showBestiary = false;
      state.showInventory = true;
      renderInventory();
      return;
    }
    return;
  }

  // Help screen
  if (state.showHelp) {
    if (e.key === 'Escape' || e.key === '?') {
      state.showHelp = false;
      hideOverlay();
      render();
    }
    return;
  }

  // Look mode
  if (state.lookMode) {
    e.preventDefault();
    if (MOVE_MAP[e.key]) {
      const [dx, dy] = MOVE_MAP[e.key];
      state.lookX = clamp(state.lookX + dx, 0, WIDTH - 1);
      state.lookY = clamp(state.lookY + dy, 0, HEIGHT - 1);
      // Update player facing toward cursor
      updateFacingToward(state.lookX, state.lookY);
      // Reset aim if cursor moved to a different target
      if (state.lookX !== state.aimX || state.lookY !== state.aimY) {
        state.aimTurns = 0;
        state.aimX = state.lookX;
        state.aimY = state.lookY;
      }
      render();
      return;
    }
    if (e.key === '[' || e.key === ']') {
      // Cycle cursor between visible entities (monsters, items, stairs, altars)
      const entities = [];
      for (const m of state.monsters) {
        if (m.hp > 0 && state.visible[m.y * WIDTH + m.x]) {
          entities.push({ x: m.x, y: m.y });
        }
      }
      for (const it of state.items) {
        if (state.visible[it.y * WIDTH + it.x]) {
          entities.push({ x: it.x, y: it.y });
        }
      }
      for (let i = 0; i < WIDTH * HEIGHT; i++) {
        if (state.visible[i]) {
          const tile = state.map[i];
          if (tile === TILE.STAIRS_DOWN || tile === TILE.ALTAR) {
            entities.push({ x: i % WIDTH, y: Math.floor(i / WIDTH) });
          }
        }
      }
      if (entities.length > 0) {
        // Sort by distance from player for consistent ordering
        const px = state.player.x, py = state.player.y;
        entities.sort((a, b) => {
          const da = (a.x - px) * (a.x - px) + (a.y - py) * (a.y - py);
          const db = (b.x - px) * (b.x - px) + (b.y - py) * (b.y - py);
          return da - db || a.y - b.y || a.x - b.x;
        });
        // Find current cursor position in the list
        const curIdx = entities.findIndex(e => e.x === state.lookX && e.y === state.lookY);
        let nextIdx;
        if (e.key === ']') {
          nextIdx = curIdx === -1 ? 0 : (curIdx + 1) % entities.length;
        } else {
          nextIdx = curIdx === -1 ? entities.length - 1 : (curIdx - 1 + entities.length) % entities.length;
        }
        state.lookX = entities[nextIdx].x;
        state.lookY = entities[nextIdx].y;
        updateFacingToward(state.lookX, state.lookY);
        state.aimTurns = 0;
        state.aimX = state.lookX;
        state.aimY = state.lookY;
      } else {
        addMsg('Nothing visible to focus on.', 'msg-info');
      }
      render();
      return;
    }
    if (e.key === 'f' || e.key === 'F') {
      // Fire at cursor target
      const fired = fireAtTarget(state.lookX, state.lookY);
      if (fired) {
        state.lookMode = false;
        state.aimTurns = 0;
        state.monsters = state.monsters.filter(m => m.hp > 0);
        endPlayerTurn();
      } else {
        render();
      }
      return;
    }
    if (e.key === '.' || e.key === '5') {
      // Aim action: spend a turn to steady your aim at the current cursor position
      state.aimX = state.lookX;
      state.aimY = state.lookY;
      state.aimTurns++;
      const bonus = Math.min(state.aimTurns * 10, 30);
      addMsg(`You steady your aim... (+${bonus}% accuracy, ${state.aimTurns} turn${state.aimTurns > 1 ? 's' : ''})`, 'msg-info');
      endPlayerTurn(); // costs a real turn — monsters move!
      return;
    }
    if (e.key === 'Escape' || e.key === 'l' || e.key === 'L') {
      state.lookMode = false;
      state.aimTurns = 0;
      addMsg('Look mode ended.', 'msg-info');
      render();
      return;
    }
    return;
  }

  // Game input
  e.preventDefault();
  const key = e.key;

  // Movement
  if (MOVE_MAP[key]) {
    tryMove(...MOVE_MAP[key]);
    return;
  }

  switch(key) {
    case '.': case '5': // Wait
      addMsg('You wait...', 'msg-info');
      endPlayerTurn();
      break;
    case 'g': case 'G': // Pick up
      tryPickup();
      render();
      break;
    case '>': // Descend
      tryDescend();
      break;
    case 'i': case 'I': // Inventory
      state.showInventory = true;
      renderInventory();
      break;
    case '?': // Help
      state.showHelp = true;
      renderHelp();
      break;
    case 'l': case 'L': // Look
      state.lookMode = true;
      addMsg('Look mode — move cursor to inspect. [/] Cycle targets · [F] Fire · [.] Aim · [ESC/L] exit.', 'msg-info');
      render();
      break;
    case 'r': case 'R': // Reload firearm
      tryReload();
      if (state.player.firearm && state.player.firearm.reloading > 0) endPlayerTurn();
      else render();
      break;
    case 'Tab': // Toggle run mode
      e.preventDefault();
      if (state.player.stamina > 0) {
        state.player.running = !state.player.running;
        addMsg(state.player.running ? 'You break into a run!' : 'You slow to a careful walk.', state.player.running ? 'msg-warning' : 'msg-info');
      } else {
        addMsg('You are too exhausted to run.', 'msg-warning');
      }
      render();
      break;
    case 't': case 'T':
      toggleTorch();
      render();
      break;
    case 'm': case 'M': { // Toggle audio mute
      const muted = toggleMuteAudio();
      addMsg(muted ? 'Audio muted.' : 'Audio unmuted.', 'msg-info');
      render();
      break;
    }
    case ']': // Rotate clockwise
      state.player.facing = rotateFacing(state.player.facing, 1);
      render();
      break;
    case '[': // Rotate counter-clockwise
      state.player.facing = rotateFacing(state.player.facing, -1);
      render();
      break;
    case '`': // Toggle dev mode
      devMode = !devMode;
      addMsg(devMode ? 'DEV MODE ON — full map revealed.' : 'DEV MODE OFF.', 'msg-warning');
      render();
      break;
  }

  // Check for death after any action
  if (state.gameOver) {
    gameOverScreen();
  }
});

// ═══════════════════════════════════════════════════════════════
//  AMBIENT AUDIO (Web Audio API — procedural, no external files)
// ═══════════════════════════════════════════════════════════════
const audio = {
  ctx: null,           // AudioContext, created on first user interaction
  master: null,        // master gain node
  droneGain: null,     // gain for the drone layer
  heartGain: null,     // gain for the heartbeat layer
  dreamGain: null,     // gain for the dreamlands layer
  seqGain: null,       // gain for the sequencer layer

  // Drone oscillators
  drones: [],          // array of { osc, gain } — base tonal layer
  lfo: null,           // low-frequency oscillator for slow pulsing

  // Heartbeat
  heartInterval: null, // setInterval ID for heartbeat ticks
  heartOsc: null,

  // Dreamlands
  dreamDrones: [],

  // Sequencer
  seq: {
    playing: false,
    currentTrack: null,  // name of active track
    bpm: 45,
    stepIndex: 0,        // current position in the pattern
    nextStepTime: 0,     // AudioContext time of next scheduled step
    scheduleAhead: 0.2,  // schedule notes this far ahead (seconds)
    timerID: null,       // setInterval for the scheduler
  },

  // State tracking for smooth transitions
  targetDroneVol: 0,
  targetHeartVol: 0,
  targetDreamVol: 0,
  initialized: false,
  muted: false,
};

// Double-pulse heartbeat sound: lub-dub
function heartbeatPulse() {
  if (!audio.ctx || audio.ctx.state === 'closed' || audio.muted) return;
  const now = audio.ctx.currentTime;
  for (let i = 0; i < 2; i++) {
    const osc = audio.ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = 40;
    const env = audio.ctx.createGain();
    env.gain.value = 0;
    const onset = now + i * 0.15;
    env.gain.setValueAtTime(0, onset);
    env.gain.linearRampToValueAtTime(0.6, onset + 0.03);
    env.gain.exponentialRampToValueAtTime(0.001, onset + 0.2);
    osc.connect(env);
    env.connect(audio.heartGain);
    osc.start(onset);
    osc.stop(onset + 0.25);
  }
}

function initAudio() {
  if (audio.initialized) return;
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    audio.ctx = new AC();
  } catch(e) { return; }

  const ctx = audio.ctx;

  // ── Master output chain ──
  // Drone → droneGain → master → compressor → destination
  audio.master = ctx.createGain();
  audio.master.gain.value = 0.25; // overall volume

  const compressor = ctx.createDynamicsCompressor();
  compressor.threshold.value = -24;
  compressor.ratio.value = 4;
  audio.master.connect(compressor);
  compressor.connect(ctx.destination);

  // ── Drone layer ──
  // Three detuned oscillators create a thick, dark ambient pad
  audio.droneGain = ctx.createGain();
  audio.droneGain.gain.value = 0;
  audio.droneGain.connect(audio.master);

  // Base frequencies: a low cluster around C2 (~65Hz) and its fifth (~98Hz)
  const droneFreqs = [55, 55.3, 82.4]; // A1, A1 slightly sharp, E2
  const droneTypes = ['sine', 'triangle', 'sine'];

  for (let i = 0; i < droneFreqs.length; i++) {
    const osc = ctx.createOscillator();
    osc.type = droneTypes[i];
    osc.frequency.value = droneFreqs[i];

    const gain = ctx.createGain();
    gain.gain.value = i === 2 ? 0.3 : 0.5; // fifth is quieter

    osc.connect(gain);
    gain.connect(audio.droneGain);
    osc.start();
    audio.drones.push({ osc, gain, baseFreq: droneFreqs[i] });
  }

  // LFO: slow volume pulsing on the drone (0.05Hz = 20-second cycle)
  audio.lfo = ctx.createOscillator();
  audio.lfo.type = 'sine';
  audio.lfo.frequency.value = 0.05;
  const lfoGain = ctx.createGain();
  lfoGain.gain.value = 0.15; // subtle pulsing
  audio.lfo.connect(lfoGain);
  lfoGain.connect(audio.droneGain.gain);
  audio.lfo.start();

  // ── Heartbeat layer ──
  audio.heartGain = ctx.createGain();
  audio.heartGain.gain.value = 0;
  audio.heartGain.connect(audio.master);

  // Heartbeat interval — adjusts dynamically via updateAmbientAudio
  audio.heartInterval = setInterval(heartbeatPulse, 1000);

  // ── Dreamlands layer ──
  // Warm, ethereal tones — major-ish harmony, higher register
  audio.dreamGain = ctx.createGain();
  audio.dreamGain.gain.value = 0;
  audio.dreamGain.connect(audio.master);

  const dreamFreqs = [261.6, 329.6, 392.0]; // C4, E4, G4 — major chord
  const dreamTypes = ['sine', 'sine', 'triangle'];

  for (let i = 0; i < dreamFreqs.length; i++) {
    const osc = ctx.createOscillator();
    osc.type = dreamTypes[i];
    osc.frequency.value = dreamFreqs[i];

    const gain = ctx.createGain();
    gain.gain.value = 0.2;

    osc.connect(gain);
    gain.connect(audio.dreamGain);
    osc.start();
    audio.dreamDrones.push({ osc, gain, baseFreq: dreamFreqs[i] });
  }

  // ── Sequencer output ──
  audio.seqGain = ctx.createGain();
  audio.seqGain.gain.value = 0;
  audio.seqGain.connect(audio.master);

  audio.initialized = true;
}

// ═══════════════════════════════════════════════════════════════
//  MUSIC SEQUENCER
// ═══════════════════════════════════════════════════════════════

// Note frequency lookup (scientific pitch notation)
const NOTE_FREQ = {
  'C2': 65.41, 'D2': 73.42, 'Eb2': 77.78, 'E2': 82.41, 'F2': 87.31,
  'G2': 98.00, 'Ab2': 103.83, 'A2': 110.00, 'Bb2': 116.54, 'B2': 123.47,
  'C3': 130.81, 'D3': 146.83, 'Eb3': 155.56, 'E3': 164.81, 'F3': 174.61,
  'G3': 196.00, 'Ab3': 207.65, 'A3': 220.00, 'Bb3': 233.08, 'B3': 246.94,
  'C4': 261.63, 'D4': 293.66, 'Eb4': 311.13, 'E4': 329.63, 'F4': 349.23,
  'G4': 392.00, 'Ab4': 415.30, 'A4': 440.00, 'Bb4': 466.16, 'B4': 493.88,
  'C5': 523.25, 'D5': 587.33, 'Eb5': 622.25, 'E5': 659.25,
};

// Track definitions: each track has a BPM, and multiple layers
// Each layer has: type (bass/melody/perc), waveform, volume, and a pattern
// Pattern entries: note name (string), null (rest), or 'x' (percussion hit)
// Each step = one beat at the track's BPM

// Schedule a single note on a layer
function scheduleNote(layer, time, detuneCents) {
  if (!audio.ctx) return;
  const ctx = audio.ctx;
  const beatDur = 60 / audio.seq.bpm;
  const dur = layer.noteLen * beatDur;

  if (layer.type === 'perc') {
    // Percussion: low-frequency thud with fast decay
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(55, time);
    osc.frequency.exponentialRampToValueAtTime(25, time + 0.15);

    const env = ctx.createGain();
    env.gain.setValueAtTime(layer.vol, time);
    env.gain.exponentialRampToValueAtTime(0.001, time + 0.3);

    osc.connect(env);
    env.connect(audio.seqGain);
    osc.start(time);
    osc.stop(time + 0.35);
    return;
  }

  // Melodic note (bass or melody)
  const noteName = layer._currentNote;
  const freq = NOTE_FREQ[noteName];
  if (!freq) return;

  const osc = ctx.createOscillator();
  osc.type = layer.wave;
  osc.frequency.value = freq;
  if (detuneCents) osc.detune.value = detuneCents;

  const env = ctx.createGain();
  // ADSR-ish envelope: quick attack, sustain, slow release
  const attack = 0.05;
  const release = Math.min(dur * 0.4, 1.0);
  env.gain.setValueAtTime(0, time);
  env.gain.linearRampToValueAtTime(layer.vol, time + attack);
  env.gain.setValueAtTime(layer.vol, time + dur - release);
  env.gain.exponentialRampToValueAtTime(0.001, time + dur);

  osc.connect(env);
  env.connect(audio.seqGain);
  osc.start(time);
  osc.stop(time + dur + 0.01);
}

// The scheduler: runs on a fast timer, scheduling notes just ahead of playback
function seqScheduler() {
  if (!audio.seq.playing || !audio.ctx) return;

  const seq = audio.seq;
  const track = MUSIC_TRACKS[seq.currentTrack];
  if (!track) return;

  const beatDur = 60 / seq.bpm;

  // Calculate insanity detune for melodic layers
  let detuneCents = 0;
  if (gameStarted && state && state.player) {
    const insanity = 1 - (state.player.sanity / state.player.maxSanity);
    detuneCents = insanity * 30; // up to 30 cents detune at zero SAN
  }

  // Schedule notes until we're far enough ahead
  while (seq.nextStepTime < audio.ctx.currentTime + seq.scheduleAhead) {
    const patLen = track.layers[0].pattern.length;

    for (const layer of track.layers) {
      const step = layer.pattern[seq.stepIndex % layer.pattern.length];
      if (step === 'x') {
        // Percussion hit
        layer._currentNote = null;
        scheduleNote(layer, seq.nextStepTime, 0);
      } else if (step) {
        // Melodic note
        layer._currentNote = step;
        const det = layer.type === 'melody' ? detuneCents : detuneCents * 0.5;
        scheduleNote(layer, seq.nextStepTime, det);
      }
      // null = rest, do nothing
    }

    seq.stepIndex = (seq.stepIndex + 1) % patLen;
    seq.nextStepTime += beatDur;
  }
}

function startSequencer(trackName) {
  if (!audio.initialized) return;
  const track = MUSIC_TRACKS[trackName];
  if (!track) return;

  const seq = audio.seq;

  // If already playing this track, don't restart
  if (seq.playing && seq.currentTrack === trackName) return;

  // Stop current sequencer
  if (seq.timerID) clearInterval(seq.timerID);

  seq.currentTrack = trackName;
  seq.bpm = track.bpm;
  seq.stepIndex = 0;
  seq.nextStepTime = audio.ctx.currentTime + 0.1; // start slightly in the future
  seq.playing = true;

  // Run scheduler every 50ms — frequent enough to stay ahead of playback
  seq.timerID = setInterval(seqScheduler, 50);
}

function stopSequencer() {
  const seq = audio.seq;
  if (seq.timerID) clearInterval(seq.timerID);
  seq.playing = false;
  seq.currentTrack = null;
}

function updateAmbientAudio() {
  if (!audio.initialized || !audio.ctx || audio.muted) return;
  if (audio.ctx.state === 'suspended') audio.ctx.resume();

  const ctx = audio.ctx;
  const now = ctx.currentTime;
  const rampTime = 2.0; // smooth 2-second transitions

  // ── Determine game state ──
  const inDreamlands = dreamPhase !== '';
  const inGame = gameStarted && state && !state.gameOver;
  const p = inGame ? state.player : null;

  // ── Dreamlands: warm tones, no drone, dream music ──
  if (inDreamlands) {
    audio.droneGain.gain.linearRampToValueAtTime(0, now + rampTime);
    audio.heartGain.gain.linearRampToValueAtTime(0, now + rampTime);
    audio.dreamGain.gain.linearRampToValueAtTime(0.5, now + rampTime);
    audio.seqGain.gain.linearRampToValueAtTime(0.6, now + rampTime);
    startSequencer('dream');
    return;
  }

  // ── Dreamlands off ──
  audio.dreamGain.gain.linearRampToValueAtTime(0, now + rampTime);

  if (!inGame || !p) {
    // Title screen or game over: very quiet drone + title music
    audio.droneGain.gain.linearRampToValueAtTime(0.15, now + rampTime);
    audio.heartGain.gain.linearRampToValueAtTime(0, now + rampTime);
    audio.seqGain.gain.linearRampToValueAtTime(0.5, now + rampTime);
    startSequencer('title');
    return;
  }

  // ── Dungeon drone ──
  // Base volume increases with depth
  const depthFactor = Math.min(1, state.dlevel / 9);
  // Sanity loss makes it louder and more dissonant
  const sanPct = p.sanity / p.maxSanity;
  const insanityFactor = 1 - sanPct; // 0 = sane, 1 = insane
  // Darkness makes it louder
  const darkFactor = (!p.torchLit || p.torch <= 0) ? 0.3 : 0;

  const droneVol = Math.min(0.8, 0.2 + depthFactor * 0.2 + insanityFactor * 0.2 + darkFactor);
  audio.droneGain.gain.linearRampToValueAtTime(droneVol, now + rampTime);

  // ── Pitch modulation: detune drones as sanity drops ──
  // At full sanity: clean intervals. At low sanity: increasingly dissonant
  const detuneCents = insanityFactor * 50; // up to 50 cents of detuning
  for (let i = 0; i < audio.drones.length; i++) {
    const d = audio.drones[i];
    // Each oscillator detunes in a different direction
    const direction = i === 0 ? 1 : i === 1 ? -1 : 0.5;
    d.osc.detune.linearRampToValueAtTime(detuneCents * direction, now + rampTime);
  }

  // ── Drone pitch drops with depth ──
  // Deeper floors = lower fundamental
  const pitchDrop = 1 - depthFactor * 0.15; // up to 15% lower at floor 9
  for (const d of audio.drones) {
    d.osc.frequency.linearRampToValueAtTime(d.baseFreq * pitchDrop, now + rampTime);
  }

  // ── LFO speed increases with insanity ──
  // Calm: 20-second cycle. Maddened: 4-second cycle
  const lfoRate = 0.05 + insanityFactor * 0.2;
  audio.lfo.frequency.linearRampToValueAtTime(lfoRate, now + rampTime);

  // ── Heartbeat: audible when HP is low ──
  const hpPct = p.hp / p.maxHp;
  let heartVol = 0;
  if (hpPct <= 0.5) {
    heartVol = (1 - hpPct / 0.5) * 0.6; // louder as HP drops below 50%
  }
  // Also audible during event chains (building tension)
  if (state.activeEventChain) heartVol = Math.max(heartVol, 0.3);
  audio.heartGain.gain.linearRampToValueAtTime(heartVol, now + rampTime);

  // Heartbeat rate: faster at lower HP
  const heartRate = hpPct <= 0.5 ? Math.max(400, 1000 * hpPct) : 1000;
  if (audio.heartInterval) clearInterval(audio.heartInterval);
  audio.heartInterval = setInterval(heartbeatPulse, heartRate);

  // ── Sequencer: pick track based on depth ──
  const seqTrack = state.dlevel >= 5 ? 'deep' : 'dungeon';
  const seqVol = Math.min(0.7, 0.3 + depthFactor * 0.2 + insanityFactor * 0.1);
  audio.seqGain.gain.linearRampToValueAtTime(seqVol, now + rampTime);
  startSequencer(seqTrack);
}

// ── Sound Effects ──
// Short synthesized sounds for combat feedback

function canPlaySfx() {
  return audio.initialized && !audio.muted && audio.ctx;
}

function sfxMeleeHit() {
  // Player hits enemy: sharp mid-frequency impact with quick decay
  if (!canPlaySfx()) return;
  const ctx = audio.ctx;
  const now = ctx.currentTime;

  // Impact thud
  const osc = ctx.createOscillator();
  osc.type = 'square';
  osc.frequency.setValueAtTime(200, now);
  osc.frequency.exponentialRampToValueAtTime(80, now + 0.08);

  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.4, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);

  osc.connect(gain);
  gain.connect(audio.master);
  osc.start(now);
  osc.stop(now + 0.15);
}

function sfxMeleeMiss() {
  // Melee swing whiff: short noise swoosh
  if (!canPlaySfx()) return;
  const ctx = audio.ctx;
  const now = ctx.currentTime;

  const bufferSize = ctx.sampleRate * 0.08;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
  }

  const noise = ctx.createBufferSource();
  noise.buffer = buffer;

  // Bandpass to make it sound like a swoosh
  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 2000;
  filter.Q.value = 1;

  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.15, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);

  noise.connect(filter);
  filter.connect(gain);
  gain.connect(audio.master);
  noise.start(now);
}

function sfxPlayerHurt() {
  // Player takes damage: low thud + brief high noise (pain)
  if (!canPlaySfx()) return;
  const ctx = audio.ctx;
  const now = ctx.currentTime;

  // Low impact
  const osc = ctx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(100, now);
  osc.frequency.exponentialRampToValueAtTime(40, now + 0.15);

  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.5, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);

  osc.connect(gain);
  gain.connect(audio.master);
  osc.start(now);
  osc.stop(now + 0.25);

  // Brief noise burst
  const bufferSize = ctx.sampleRate * 0.06;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
  }
  const noise = ctx.createBufferSource();
  noise.buffer = buffer;
  const nGain = ctx.createGain();
  nGain.gain.setValueAtTime(0.2, now);
  nGain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
  noise.connect(nGain);
  nGain.connect(audio.master);
  noise.start(now);
}

function sfxGunfire() {
  // Gunshot: noise burst + low frequency punch
  if (!canPlaySfx()) return;
  const ctx = audio.ctx;
  const now = ctx.currentTime;

  // Noise burst (the "crack")
  const bufferSize = ctx.sampleRate * 0.15;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 3);
  }
  const noise = ctx.createBufferSource();
  noise.buffer = buffer;

  // Highpass to make it sharp
  const filter = ctx.createBiquadFilter();
  filter.type = 'highpass';
  filter.frequency.value = 800;

  const nGain = ctx.createGain();
  nGain.gain.setValueAtTime(0.5, now);
  nGain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);

  noise.connect(filter);
  filter.connect(nGain);
  nGain.connect(audio.master);
  noise.start(now);

  // Low-end punch (the "boom")
  const osc = ctx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(150, now);
  osc.frequency.exponentialRampToValueAtTime(30, now + 0.1);

  const oGain = ctx.createGain();
  oGain.gain.setValueAtTime(0.6, now);
  oGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);

  osc.connect(oGain);
  oGain.connect(audio.master);
  osc.start(now);
  osc.stop(now + 0.2);
}

function sfxDoorOpen() {
  // Door creak: filtered noise with rising pitch
  if (!canPlaySfx()) return;
  const ctx = audio.ctx;
  const now = ctx.currentTime;

  const osc = ctx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(80, now);
  osc.frequency.linearRampToValueAtTime(200, now + 0.15);
  osc.frequency.linearRampToValueAtTime(120, now + 0.25);

  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 600;
  filter.Q.value = 5;

  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.12, now);
  gain.gain.linearRampToValueAtTime(0.08, now + 0.15);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(audio.master);
  osc.start(now);
  osc.stop(now + 0.35);
}

function toggleMuteAudio() {
  audio.muted = !audio.muted;
  if (audio.initialized && audio.ctx) {
    const now = audio.ctx.currentTime;
    audio.master.gain.linearRampToValueAtTime(audio.muted ? 0 : 0.25, now + 0.3);
  }
  return audio.muted;
}

// ═══════════════════════════════════════════════════════════════
//  RESIZE HANDLE (draggable divider between map and message log)
// ═══════════════════════════════════════════════════════════════
(function initResizeHandle() {
  const display = document.getElementById('display');
  const handle = document.getElementById('resize-handle');
  const mainArea = document.getElementById('main-area');

  // Set initial display width based on map columns.
  // Measure one character's rendered width, then multiply by WIDTH.
  function setDisplayWidth() {
    const measurer = document.createElement('span');
    measurer.style.cssText = 'font-family:"Courier New",monospace;font-size:13px;letter-spacing:1px;white-space:pre;position:absolute;visibility:hidden;';
    measurer.textContent = 'X';
    document.body.appendChild(measurer);
    const charW = measurer.getBoundingClientRect().width;
    document.body.removeChild(measurer);
    // 80 columns + padding (4px each side) + border (1px each side)
    const totalW = Math.ceil(charW * WIDTH) + 10;
    display.style.width = totalW + 'px';
  }
  setDisplayWidth();

  // Draggable resize — adjusts message log width
  const msgLog = document.getElementById('message-log');
  let dragging = false;
  let startX = 0;
  let startW = 0;

  handle.addEventListener('mousedown', function(e) {
    e.preventDefault();
    dragging = true;
    startX = e.clientX;
    startW = msgLog.getBoundingClientRect().width;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    // Dragging right shrinks the log, dragging left grows it
    const dx = e.clientX - startX;
    const newW = Math.max(120, startW - dx);
    msgLog.style.width = newW + 'px';
  });

  document.addEventListener('mouseup', function() {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();
